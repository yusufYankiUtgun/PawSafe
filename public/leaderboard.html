<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PawSafe — Sıralama</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="/" class="navbar-brand">
    <span class="paw-icon">🐾</span> PawSafe
  </a>
  <div class="navbar-links">
    <a href="/" class="nav-link">🗺️ Harita</a>
    <a href="/leaderboard" class="nav-link active">🏆 Sıralama</a>
    <a href="/shelter" class="nav-link">🏠 Barınaklar</a>
    <a href="/donation" class="nav-link">❤️ Bağış</a>
    <a href="/profile" class="nav-link">👤 Profil</a>
    <a href="/login" class="nav-btn primary" id="nav-login">Giriş Yap</a>
    <button id="nav-logout" class="nav-btn" style="display:none">Çıkış</button>
  </div>
</nav>

<div class="page-wrapper">
  <div class="page-header">
    <h1>🏆 En İyi Katkıcılar</h1>
    <p>Hayvan ihbarlarını doğrulayan kullanıcılar trust skoru kazanır</p>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Kullanıcı Sıralaması</h2>
      <span id="last-update"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th>Sıra</th>
          <th>Kullanıcı</th>
          <th>Trust Skoru</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body">
        <tr><td colspan="3" style="text-align:center;padding:30px;color:#999">Yükleniyor...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="/js/leaderboardPage.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const token = localStorage.getItem('token');
    const username = localStorage.getItem('username');
    if (token) {
      document.getElementById('nav-login').style.display = 'none';
      document.getElementById('nav-logout').style.display = 'flex';
    }
    document.getElementById('nav-logout')?.addEventListener('click', () => {
      localStorage.clear(); window.location.href = '/login';
    });
  });
</script>
</body>
</html>
